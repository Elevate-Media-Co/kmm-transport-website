<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="careBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#dcfce7" />
    </linearGradient>

    <!-- Deep Blue Glow -->
    <linearGradient id="mainGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a6fdb" />
      <stop offset="100%" stop-color="#0b1e36" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#careBg)" rx="20" stroke="#cbd5e1" stroke-width="1" />
  
  <!-- Subtle circular grid nodes -->
  <circle cx="200" cy="150" r="110" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="3 3" opacity="0.25" />

  <!-- MAIN GRAPHIC: Compassionate Caring Hands supporting a Heart -->
  <g transform="translate(0, -10)" filter="url(#softShadow)">
    
    <!-- Heart symbol (representing care and health) -->
    <path d="M 200 145 C 200 145 180 115 155 130 C 130 145 130 185 160 205 L 200 245 L 240 205 C 270 185 270 145 245 130 C 220 115 200 145 200 145 Z" fill="#ef4444" opacity="0.85" />
    
    <!-- Left Hand -->
    <path d="M 120 220 
             C 140 190, 165 170, 185 175 
             C 190 176, 195 180, 198 185 
             L 175 220 
             C 160 215, 145 222, 135 235 Z" 
          fill="url(#mainGlow)" />
          
    <!-- Right Hand -->
    <path d="M 280 220 
             C 260 190, 235 170, 215 175 
             C 210 176, 205 180, 202 185 
             L 225 220 
             C 240 215, 255 222, 265 235 Z" 
          fill="url(#mainGlow)" />

    <!-- Supporting Wrist Sleeves (Professional uniforms) -->
    <path d="M 100 250 L 130 225 C 135 235 145 240 150 255 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />
    <path d="M 300 250 L 270 225 C 265 235 255 240 250 255 Z" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" />
  </g>

  <!-- FLOATING BADGES -->
  <!-- Badge: Senior Care -->
  <g transform="translate(45, 45)" filter="url(#softShadow)">
    <rect width="105" height="30" fill="#ffffff" rx="8" />
    <circle cx="15" cy="15" r="7" fill="#e0f2fe" />
    <path d="M 15 11 A 1.8 1.8 0 1 0 15 14.6 A 1.8 1.8 0 1 0 15 11 Z" fill="#0284c7" />
    <path d="M 11 19 C 11 17.5 12.5 16.5 15 16.5 C 17.5 16.5 19 17.5 19 19 Z" fill="#0284c7" />
    <text x="28" y="18" font-family="sans-serif" font-size="8" font-weight="extrabold" fill="#0f172a">Senior Care</text>
  </g>

  <!-- Badge: Patient Support -->
  <g transform="translate(255, 45)" filter="url(#softShadow)">
    <rect width="105" height="30" fill="#ffffff" rx="8" />
    <circle cx="15" cy="15" r="7" fill="#fef3c7" />
    <!-- Heart Icon Mini -->
    <path d="M 15 12.5 C 15 12.5 14.2 11.5 13 12.2 C 12 13 12 14.5 13.5 15.5 L 15 17 L 16.5 15.5 C 18 14.5 18 13 17 12.2 C 15.8 11.5 15 12.5 15 12.5 Z" fill="#d97706" />
    <text x="28" y="18" font-family="sans-serif" font-size="8" font-weight="extrabold" fill="#0f172a">Compassionate</text>
  </g>

  <!-- Badge: Punctual -->
  <g transform="translate(150, 245)" filter="url(#softShadow)">
    <rect width="100" height="30" fill="#ffffff" rx="8" />
    <circle cx="15" cy="15" r="7" fill="#d1fae5" />
    <!-- Clock Icon Mini -->
    <circle cx="15" cy="15" r="5" stroke="#059669" stroke-width="1.2" fill="none" />
    <path d="M 15 12.5 V 15 L 16.5 15.5" stroke="#059669" stroke-width="1.2" stroke-linecap="round" />
    <text x="28" y="18" font-family="sans-serif" font-size="8" font-weight="extrabold" fill="#0f172a">On-Time Ride</text>
  </g>
</svg>
